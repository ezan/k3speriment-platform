extends: default

rules:
  line-length:
    max: 160
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: true
  document-start: disable

ignore: |
  charts/**/templates/
