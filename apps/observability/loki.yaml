apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.16.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          limits_config:
            retention_period: 168h
            reject_old_samples: true
            reject_old_samples_max_age: 168h

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 10Gi
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 768Mi

        # Disable the helper components we don't need in single-binary mode.
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        # The chart's Helm test pod isn't useful for us.
        test:
          enabled: false
        lokiCanary:
          enabled: false

        gateway:
          enabled: false

        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
