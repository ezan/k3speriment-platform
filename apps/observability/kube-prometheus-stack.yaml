apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        crds:
          enabled: true

        alertmanager:
          enabled: false

        defaultRules:
          create: true
          rules:
            alertmanager: false
            etcd: false
            kubeControllerManager: false
            kubeProxy: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false

        grafana:
          enabled: true
          defaultDashboardsEnabled: true
          defaultDashboardsTimezone: browser
          adminPassword: changeme
          persistence:
            enabled: true
            storageClassName: local-path
            size: 5Gi
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 512Mi
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
              labelValue: "1"
            datasources:
              enabled: true
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              jsonData:
                maxLines: 1000
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.k3s.local
            path: /

        prometheus:
          prometheusSpec:
            retention: 7d
            retentionSize: 8GB
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1500Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 10Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        additionalPrometheusRulesMap:
          homelab-health:
            groups:
              - name: homelab.nodes
                rules:
                  - alert: NodeDiskPressure
                    expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Node {{ $labels.node }} has DiskPressure."
                  - alert: NodeMemoryPressure
                    expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Node {{ $labels.node }} has MemoryPressure."
                  - alert: DataDiskNearlyFull
                    expr: |
                      (node_filesystem_avail_bytes{mountpoint="/mnt/data"}
                       / node_filesystem_size_bytes{mountpoint="/mnt/data"}) < 0.15
                    for: 10m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Data disk on {{ $labels.instance }} has <15% free."

        prometheusOperator:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi

        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        nodeExporter:
          enabled: true

        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
